data:

  obs: None
  obs_east: ../../obs_data/WASP-39b_JWST_evening_east.txt
  obs_west: ../../obs_data/WASP-39b_JWST_morning_west.txt
  stellar: None

physics:

  nlay: 99

  vert_Tp: modified_guillot
  vert_alt: p_ref
  vert_chem: constant_vmr_clr
  vert_mu: dynamic
  vert_cloud: exponential_decay_profile

  opac_line: ck
  opac_ray: ck
  opac_cia: ck
  opac_cloud: F18
  opac_special: None

  rt_scheme: transit_1_5d   # transit_1d | transit_1_5d | emission_1d
  contri_func: False
  refraction: None

opac:

  wl_master: ../../opac_data/ck/wl_ck_R1000.txt
  full_grid: False
  ck: True
  ck_mix: TRANS

  line:
    - {species: H2O, path: ../../opac_data/ck/H2O_ck_R1000.zarr.zip}
    - {species: CO2, path: ../../opac_data/ck/CO2_ck_R1000.zarr.zip}
    - {species: CO,  path: ../../opac_data/ck/CO_ck_R1000.zarr.zip}
    - {species: CH4, path: ../../opac_data/ck/CH4_ck_R1000.zarr.zip}
    - {species: SO2, path: ../../opac_data/ck/SO2_ck_R1000.zarr.zip}
    - {species: Na, path: ../../opac_data/ck/Na_ck_R1000.zarr.zip}
    - {species: K, path: ../../opac_data/ck/K_ck_R1000.zarr.zip}
  ray:
    - {species: H2}
    - {species: He}
  cia:
    - {species: H2-H2, path: ../../opac_data/cia/H2-H2_2011.zarr.zip}
    - {species: H2-He, path: ../../opac_data/cia/H2-He_2011.zarr.zip}
  special: None
  cloud: None

params:

  # transit_1_5d requires every parameter name to end in _joint, _east, or _west.
  # Use _joint for shared quantities, and paired _east/_west entries for limb-specific ones.

  # --- Shared geometry / pressure structure ---
  - { name: R_s_joint,          dist: delta,   value: 0.931, transform: identity, init: 0.931 }
  - { name: p_bot_joint,        dist: delta,   value: 1000.0, transform: identity, init: 1000.0 }
  - { name: p_top_joint,        dist: delta,   value: 1e-8,  transform: identity, init: 1e-8 }
  - { name: log_10_p_ref_joint, dist: delta,   value: 1.0,   transform: identity, init: 1.0 }
  - {name: f_hem_joint, dist: delta, value: 0.25, transform: identity, init: 0.25}
  - {name: T_int_joint, dist: uniform, low: 100.0, high: 600.0, transform: logit, init: 600.0}
  - {name: cld_rho_joint, dist: delta,   value: 1.0,transform: identity, init: 1.0}  # particle density [g/cm^3]
  - {name: cld_Q1_joint,  dist: delta,   value: 1.0, transform: identity, init: 1.0}

  # --- East limb ---
  - { name: R_p_east,       dist: uniform, low: 1.00, high: 1.50, transform: logit, init: 1.25 }
  - { name: log_10_g_east,  dist: uniform, low: 2.0,  high: 3.5,  transform: logit, init: 3.1 }
  - { name: T_eq_east,     dist: uniform, low: 500.0, high: 1500.0, transform: logit, init: 1200.0 }
  - { name: log_10_f_H2O_east, dist: uniform, low: -12, high: -2, transform: logit, init: -4.0 }
  - { name: log_10_f_CO2_east, dist: uniform, low: -12, high: -2, transform: logit, init: -5.0 }
  - { name: log_10_f_CO_east,  dist: uniform, low: -12, high: -2, transform: logit, init: -4.0 }
  - { name: log_10_f_CH4_east, dist: uniform, low: -12, high: -2, transform: logit, init: -8.0 }
  - { name: log_10_f_SO2_east, dist: uniform, low: -12, high: -2, transform: logit, init: -8.0 }
  - { name: log_10_f_Na_east, dist: uniform, low: -12, high: -2, transform: logit, init: -8.0 }
  - { name: log_10_f_K_east, dist: uniform, low: -12, high: -2, transform: logit, init: -8.0 }

  - {name: log_10_k_ir_east, dist: uniform, low: -6, high: 2, transform: logit, init: -6}
  - {name: log_10_gam_v_east, dist: uniform, low: -3, high: 2, transform: logit, init: -1.0}
  - {name: q_irr_0_east, dist: uniform, low: 0.01, high: 0.66, transform: logit, init: 0.3}
  - {name: log_10_p_t_east, dist: uniform, low: -7, high: 1, transform: logit, init: -2}
  - {name: beta_east, dist: uniform, low: 0.1, high: 1.0, transform: logit, init: 0.5}

  - {name: log_10_cld_r_east, dist: uniform, low:  -3, high: 2, transform: logit, init: 0   }  # particle radius [log10 micron]
  - {name: cld_Q0_east,  dist: uniform, low: 0.1,  high: 65,   transform: logit, init: 30.0 }
  - {name: cld_a_east,   dist: uniform, low: 3.0,  high: 7.0,  transform: logit, init: 4.0  }
  - {name: log_10_q_c_east,  dist: uniform, low: -12, high: 0,  transform: logit, init: 0   }  # cloud mass mixing ratio [log10]
  - {name: log_10_p_base_east, dist: uniform, low: -6, high: 1, transform: logit, init: 0}
  - {name: log_10_alpha_cld_east, dist: uniform, low: -2, high: 2, transform: logit, init: 0}

  # --- West limb ---
  - { name: R_p_west,       dist: uniform, low: 1.00, high: 1.50, transform: logit, init: 1.25 }
  - { name: log_10_g_west,  dist: uniform, low: 2.0,  high: 3.5,  transform: logit, init: 3.1 }
  - { name: T_eq_west,     dist: uniform, low: 500.0, high: 1500.0, transform: logit, init: 1000.0 }
  - { name: log_10_f_H2O_west, dist: uniform, low: -12, high: -2, transform: logit, init: -4.5 }
  - { name: log_10_f_CO2_west, dist: uniform, low: -12, high: -2, transform: logit, init: -5.5 }
  - { name: log_10_f_CO_west,  dist: uniform, low: -12, high: -2, transform: logit, init: -4.5 }
  - { name: log_10_f_CH4_west, dist: uniform, low: -12, high: -2, transform: logit, init: -7.0 }
  - { name: log_10_f_SO2_west, dist: uniform, low: -12, high: -2, transform: logit, init: -7.0 }
  - { name: log_10_f_Na_west, dist: uniform, low: -12, high: -2, transform: logit, init: -7.0 }
  - { name: log_10_f_K_west, dist: uniform, low: -12, high: -2, transform: logit, init: -7.0 }

  - {name: log_10_k_ir_west, dist: uniform, low: -6, high: 2, transform: logit, init: -6}
  - {name: log_10_gam_v_west, dist: uniform, low: -3, high: 2, transform: logit, init: -1.0}
  - {name: q_irr_0_west, dist: uniform, low: 0.01, high: 0.66, transform: logit, init: 0.3}
  - {name: log_10_p_t_west, dist: uniform, low: -7, high: 1, transform: logit, init: -2}
  - {name: beta_west, dist: uniform, low: 0.1, high: 1.0, transform: logit, init: 0.5}

  - {name: log_10_cld_r_west, dist: uniform, low:  -3, high: 2, transform: logit, init: 0   }  # particle radius [log10 micron]
  - {name: cld_Q0_west,  dist: uniform, low: 0.1,  high: 65,   transform: logit, init: 30.0 }
  - {name: cld_a_west,   dist: uniform, low: 3.0,  high: 7.0,  transform: logit, init: 4.0  }
  - {name: log_10_q_c_west,  dist: uniform, low: -12, high: 0,  transform: logit, init: 0   }  # cloud mass mixing ratio [log10]
  - {name: log_10_p_base_west, dist: uniform, low: -6, high: 1, transform: logit, init: 0}
  - {name: log_10_alpha_cld_west, dist: uniform, low: -2, high: 2, transform: logit, init: 0}

sampling:

  engine: dynesty

  dynesty:
    nlive: 1000
    bound: multi
    sample: auto
    dlogz: 0.1
    maxiter: null
    maxcall: null
    bootstrap: 0
    enlarge: null
    update_interval: null
    dynamic: false
    print_progress: true
    seed: 42

runtime:
  platform: gpu
  cuda_visible_devices: 1
  threads: 1
