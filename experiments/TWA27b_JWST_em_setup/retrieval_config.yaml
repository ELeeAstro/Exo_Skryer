data:

  obs: ../../obs_data/twa27b_JWST_em.txt
  obs_east: None
  obs_west: None
  stellar: None
  nasa9: ../../NASA9/

physics:

  nlay: 99

  vert_Tp: Modified_Milne
  vert_alt: p_ref
  vert_chem: quench_approx
  vert_mu: dynamic
  vert_cloud: exponential_decay_profile

  opac_line: os
  opac_ray: os
  opac_cia: os
  opac_cloud: direct_nk
  opac_special: None
  cloud_dist: mono

  rt_scheme: emission_1d   # transit_1d | transit_2d | emission_1d
  emission_mode: brown_dwarf
  em_scheme: eaa
  contri_func: False
  refraction: None

opac:

  wl_master: ../../opac_data/os/wl_R20000.txt
  full_grid: False
  ck: False
  ck_mix: RORR

  line:
    - {species: H2O, path: ../../opac_data/os/H2O_R20000.zarr.zip}
    - {species: CO, path: ../../opac_data/os/CO_R20000.zarr.zip}
    - {species: CO2, path: ../../opac_data/os/CO2_R20000.zarr.zip}
    - {species: CH4, path: ../../opac_data/os/CH4_R20000.zarr.zip}
    - {species: NH3, path: ../../opac_data/os/NH3_R20000.zarr.zip}
    - {species: HCN, path: ../../opac_data/os/HCN_R20000.zarr.zip}
    - {species: K, path: ../../opac_data/os/K_R20000.zarr.zip}

  ray:
    - {species: H2}
    - {species: He}
  cia:
    - {species: H2-H2, path: ../../opac_data/cia/H2-H2_2011.zarr.zip}
    - {species: H2-He, path: ../../opac_data/cia/H2-He_2011.zarr.zip}
  special: None
  cloud: None

params:

  - { name: R_s,   dist: delta,   value: 0.0, transform: identity, init: 0.0}
  - { name: D,   dist: delta,   value: 64.5, transform: identity, init: 64.5}
  - { name: p_bot, dist: delta,   value: 1000.0,  transform: identity, init: 1000.0 }
  - { name: p_top, dist: delta,   value: 1e-4, transform: identity, init: 1e-4}
  - { name: log_10_p_ref, dist: delta,   value: 1.0, transform: identity, init: 1.0}
  - { name: R_p, dist: delta, value: 1.0,  transform: identity, init: 1.0}

  - { name: log_10_g,  dist: uniform, low: 3.0,   high: 4.5,  transform: logit, init: 5.0}
  - { name: f_p, dist: uniform, low: 0.1,   high: 5.0,  transform: logit, init: 1.0}
  #- { name: M_p, dist: uniform, low: 1.0,   high: 80.0,  transform: logit, init: 1.0}
  - { name: c, dist: uniform, low: -13.37,   high: -9.53,  transform: logit, init: -11.0}

  - { name: T_ratio, dist: uniform, low: 0.01,   high: 1.0, transform: logit, init: 0.5 }
  - { name: T_int, dist: uniform, low: 1000.0,   high: 1500.0, transform: logit, init: 1000.0 }
  - { name: log_10_k_ir, dist: uniform, low: -6,   high: 2,  transform: logit, init: -1}
  - { name: log_10_p_t, dist: uniform, low: -4,   high: 3,  transform: logit, init: 0}
  - { name: beta, dist: uniform, low: 0.0,   high: 1.0,  transform: logit, init: 0.5}

  # Chemistry parameters (quench_approx: CE from FastChem grid + quenching)
  - {name: M_to_H,      dist: uniform, low: -1.0,  high: 3.0,  transform: logit, init: 0.0}
  - {name: C_to_O,      dist: uniform, low: 0.1,   high: 2.0,  transform: logit, init: 0.55}
  - {name: log_10_Kzz,  dist: uniform, low: 5.0,   high: 11.0, transform: logit, init: 8.0}

  # --- Cloud (exponential decay profile + nk_f18_blend opacity) ---
  - {name: log_10_q_c,       dist: uniform, low: -12, high:  0, transform: logit, init:  0}   # cloud mass mixing ratio [log10]
  - {name: log_10_p_base,    dist: uniform, low:  -4, high:  3, transform: logit, init:  0}   # cloud base pressure [log10 bar]
  - {name: log_10_alpha_cld, dist: uniform, low:  -2, high:  2, transform: logit, init:  0}   # exponential scale height [log10]
  - {name: log_10_cld_r,     dist: uniform, low:  -3, high:  2, transform: logit, init:  0}   # direct_nk particle radius [log10 micron]
  - {name: cld_rho,          dist: delta,   value: 2.5,         transform: identity, init: 2.5}

  # --- Wavelength nodes for n,k interpolation [micron] ---
  - {name: wl_node_0,  dist: delta, value:  7.0,  transform: identity, init:  7.0}
  - {name: wl_node_1,  dist: delta, value:  7.5,  transform: identity, init:  7.5}
  - {name: wl_node_2,  dist: delta, value:  8.0,  transform: identity, init:  8.0}
  - {name: wl_node_3,  dist: delta, value:  8.25, transform: identity, init:  8.25}
  - {name: wl_node_4,  dist: delta, value:  8.5,  transform: identity, init:  8.5}
  - {name: wl_node_5,  dist: delta, value:  8.75, transform: identity, init:  8.75}
  - {name: wl_node_6,  dist: delta, value:  9.0,  transform: identity, init:  9.0}
  - {name: wl_node_7,  dist: delta, value:  9.25, transform: identity, init:  9.25}
  - {name: wl_node_8,  dist: delta, value:  9.5,  transform: identity, init:  9.5}
  - {name: wl_node_9,  dist: delta, value: 10.0,  transform: identity, init: 10.0}

  # --- n(λ) and k(λ) at each wavelength node ---
  - {name: n_0,         dist: uniform, low: 0.3, high: 4.0, transform: logit, init: 0}
  - {name: n_1,         dist: uniform, low: 0.3, high: 4.0, transform: logit, init: 0}
  - {name: n_2,         dist: uniform, low: 0.3, high: 4.0, transform: logit, init: 0}
  - {name: n_3,         dist: uniform, low: 0.3, high: 4.0, transform: logit, init: 0}
  - {name: n_4,         dist: uniform, low: 0.3, high: 4.0, transform: logit, init: 0}
  - {name: n_5,         dist: uniform, low: 0.3, high: 4.0, transform: logit, init: 0}
  - {name: n_6,         dist: uniform, low: 0.3, high: 4.0, transform: logit, init: 0}
  - {name: n_7,         dist: uniform, low: 0.3, high: 4.0, transform: logit, init: 0}
  - {name: n_8,         dist: uniform, low: 0.3, high: 4.0, transform: logit, init: 0}
  - {name: n_9,         dist: uniform, low: 0.3, high: 4.0, transform: logit, init: 0}

  - {name: log_10_k_0,  dist: uniform, low: -6, high: 1, transform: logit, init: 0}
  - {name: log_10_k_1,  dist: uniform, low: -6, high: 1, transform: logit, init: 0}
  - {name: log_10_k_2,  dist: uniform, low: -6, high: 1, transform: logit, init: 0}
  - {name: log_10_k_3,  dist: uniform, low: -6, high: 1, transform: logit, init: 0}
  - {name: log_10_k_4,  dist: uniform, low: -6, high: 1, transform: logit, init: 0}
  - {name: log_10_k_5,  dist: uniform, low: -6, high: 1, transform: logit, init: 0}
  - {name: log_10_k_6,  dist: uniform, low: -6, high: 1, transform: logit, init: 0}
  - {name: log_10_k_7,  dist: uniform, low: -6, high: 1, transform: logit, init: 0}
  - {name: log_10_k_8,  dist: uniform, low: -6, high: 1, transform: logit, init: 0}
  - {name: log_10_k_9,  dist: uniform, low: -6, high: 1, transform: logit, init: 0}

  # --- Instrument offsets [erg/s/cm^2/cm] ---
  - {name: offset_NIRSpec, dist: delta,   value: 0, transform: identity, init: 0}
  - {name: offset_MIRI,    dist: delta,   value: 0, transform: identity, init: 0}   # placeholder — set prior once residuals are known

# ----------------------------------------------------------------------------------
# FastChem 5D Grid (CE backend for quench_approx)
# ----------------------------------------------------------------------------------
fastchem_grid_jax:
  grid_path: ../../FastChem/fastchem_grid_5d_log10.npz
  solver:
    mode: vmap   # vmap | scan
  bounds:
    mode: clip
  species_map:

# ----------------------------------------------------------------------------------
# Quench Approximation
# ----------------------------------------------------------------------------------
quench_approx:
  quench_species:
    - CO
    - CO2
    - CH4
    - NH3
    - HCN

sampling:

  engine: dynesty

  nuts:
    backend: numpyro
    warmup: 100
    draws: 100
    seed: 42
    chains: 1

  jaxns:
    # ---- core NS config ----
    max_samples: 100000          # hard cap on nested-sampling iterations
    num_live_points: 100        # live points (posterior resolution)

    # Slice sampler hyperparameters
    s: 4                        # slices per dimension (default ~4)
    k: 0                         # phantom samples (0 = off, >0 for hard posteriors)
    c: null                       # parallel chains (null -> jaxns default, ~20*D)
    shell_fraction: 0.5          # fraction of shell explored per step (0<sf<=1)

    # Global behaviour flags
    difficult_model: false       # robust defaults for gnarly posteriors
    parameter_estimation: true   # tune for good posterior, not just evidence
    gradient_guided: false       # use gradients for proposals (only if stable)
    init_efficiency_threshold: 0.1  # >0: initial uniform sampling until eff>thr
    verbose: true               # print textual progress to CLI

    # ---- termination controls ----
    termination:
      ess: 10000                        # target effective sample size
      evidence_uncert: null            # stop when σ_logZ < 0.3
      dlogZ: 1.0                     # stop when remaining evidence small
      max_samples: 100000             # safety cap for samples
      max_num_likelihood_evaluations: null
      rtol: null
      atol: null

    # ---- posterior handling ----
    posterior_samples: 10000           # equal-weight posterior draws
    seed: 42                          # RNG seed for JAX

  blackjax_ns:
    num_live_points: 150
    num_inner_steps: 50
    num_delete: 75
    dlogz_stop: 0
    seed: 42

  # Dynesty settings
  dynesty:
    nlive: 1000
    bound: multi
    sample: auto
    dlogz: 0.1
    maxiter: null
    maxcall: null
    bootstrap: 0
    enlarge: null
    update_interval: null
    dynamic: false
    print_progress: true
    seed: 42

  # UltraNest settings
  ultranest:
    num_live_points: 1000
    min_num_live_points: 100
    dlogz: 0.1
    max_iters: 0
    verbose: true
    show_status: true

  # PyMultiNest settings
  pymultinest:
    n_live_points: 1000              # Number of live points
    evidence_tolerance: 0.1          # dlogZ stopping criterion
    sampling_efficiency: 0.3         # 0.8 (unimodal), 0.3 (multimodal)
    n_iter_before_update: 100        # Update interval for proposals
    null_log_evidence: -1.0e99       # Null evidence (usually leave default)
    max_modes: 100                   # Maximum number of modes to find
    mode_tolerance: -1.0e99          # Mode separation tolerance
    seed: -1                         # Random seed (-1 = random, >=0 for reproducibility)
    verbose: true                    # Print progress
    resume: false                     # Resume from previous run if interrupted
    importance_nested_sampling: false # Use importance nested sampling
    multimodal: true                 # Enable multimodal mode detection
    const_efficiency_mode: false     # Constant efficiency mode

runtime:
  platform: gpu           # cpu | gpu | cuda | metal
  cuda_visible_devices: 0  # or "0,1"
  threads: 1
